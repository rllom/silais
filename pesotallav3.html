<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Crecimiento Infantil</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        #resultado { margin-top: 1.5rem; padding: 15px; border-radius: 6px; display: none; background-color: #e8f4fd; }
    </style>
</head>
<body>

<div class="card">
<center>
<img src="https://i.ibb.co/NMgRf7z/log-RSJ.png" width="300px" width="300px" alt="SILAIS RSJ" class="logo"></center>
    <h2>Calculo Peso y Talla Ideal<br>de 0-60 meses</h2>
    <div class="input-group">
        <label>Sexo:</label>
        <select id="sexo">
            <option value="nino">Niño</option>
            <option value="nina">Niña</option>
        </select>
    </div>
    <div class="input-group">
        <label>Edad (meses):</label>
        <input type="number" id="edad" placeholder="0-60" min="0" max="60">
    </div>
    <button onclick="calcular()">Consultar Rangos</button>

    <div id="resultado">
        <strong>Resultados (Promedio OMS):</strong>
        <p id="pesoTxt"></p>
        <p id="tallaTxt"></p>
        <small style="color: #7f8c8d;">*Estos valores son referenciales. Consulte siempre a su pediatra.</small>
    </div>
</div>

<script>
function calcular() {
    const edad = parseInt(document.getElementById('edad').value);
    const sexo = document.getElementById('sexo').value;
    const resDiv = document.getElementById('resultado');

    if (isNaN(edad) || edad < 0 || edad > 60) {
        alert("Por favor, introduce una edad válida entre 0 y 60 meses.");
        return;
    }

    // Lógica simplificada basada en curvas de crecimiento OMS (Percentil 50)
    let peso, talla;

    if (sexo === 'nino') {
        peso = 3.3 + (0.8 * edad); // Estimación lineal simple para ejemplo
        talla = 50 + (2 * edad);   // Ajuste aproximado
        // Refinamiento para mayores de 12 meses
        if(edad > 12) {
            peso = (edad * 0.2) + 8; 
            talla = 75 + (edad - 12) * 0.8;
        }
    } else {
        peso = 3.2 + (0.75 * edad);
        talla = 49 + (1.9 * edad);
        if(edad > 12) {
            peso = (edad * 0.18) + 7.5;
            talla = 74 + (edad - 12) * 0.8;
        }
    }

    document.getElementById('pesoTxt').innerText = "Peso Ideal: ~" + peso.toFixed(1) + " kg";
    document.getElementById('tallaTxt').innerText = "Talla Normal: ~" + talla.toFixed(1) + " cm";
    resDiv.style.display = 'block';
}
</script>


<DIV id='floting' style='position:fixed; bottom:10px; right:10px;'>
<a href="pesotalla+61.html">
<img id="null" src="https://i.ibb.co/Y41BP3XX/61-170m.png" width="100px" height="37px" style='opacity: 0.8; border-radius: 0px; box-shadow: 0px 0px 0px 0px #000000;'/></a>

</div>
</body>
</html>
